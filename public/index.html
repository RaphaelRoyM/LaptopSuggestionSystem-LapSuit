<!-- index.html -->
<!DOCTYPE html>
<html>

<head>
  <title>Laptop Suggestion System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
    }

    .header img {
      width: 70px;
      margin-right: 20px;
    }

    .search-section {
      text-align: center;
      margin-top: 30px;
    }

    input[type="text"] {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: orange;
    }

    button:hover {
      opacity: 0.9;
    }

    /* FULL SCREEN FILTER PANEL */
    #filterPanel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      color: black;
      display: none;
      z-index: 2000;
    }

    .filter-container {
      display: flex;
      height: 100%;
    }

    /* LEFT SECTION */
    .filter-left {
      width: 30%;
      background: #f1f1f1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ccc;
    }

    .filter-options {
      list-style: none;
      padding: 0;
    }

    .filter-options li {
      padding: 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    .filter-options li.active {
      background: #2a5298;
      color: white;
    }

    .apply-btn {
      padding: 12px;
      background: #2a5298;
      color: white;
      text-align: center;
      cursor: pointer;
      border-radius: 5px;
    }

    /* RIGHT SECTION */
    .filter-right {
      width: 70%;
      padding: 20px;
      overflow-y: auto;
    }

    .brand-item {
      margin: 10px 0;
      font-size: 16px;
    }

    .close-filter {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 28px;
      cursor: pointer;
    }

    /* Laptop Cards */
    .laptop-card {
      background: white;
      color: black;
      padding: 15px;
      margin: 15px auto;
      width: 70%;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/1041/1041884.png">
    <h1>Laptop Suggestion System</h1>
  </div>

  <div class="search-section">
    <input type="text" placeholder="search by name">
    <button>Search</button>
    <br><br>
    <button onclick="openFilter()">Set Preferences</button>
  </div>

  <!-- FULL SCREEN FILTER PANEL -->
  <div id="filterPanel">
    <span class="close-filter" onclick="closeFilter()">✖</span>

    <div class="filter-container">

      <!-- LEFT SIDE -->
      <div class="filter-left">

        <ul class="filter-options">
          <li class="active" onclick="showSection('brandSection')">Brand</li>
          <li onclick="showSection('priceSection')">Price</li>
        </ul>

        <div class="apply-btn" onclick="applyFilter()">
          Apply
        </div>

      </div>
      <!-- RIGHT SIDE -->
      <div class="filter-right">

        <!-- BRAND SECTION -->
        <div id="brandSection">
          <h3>Select Brands</h3>
          <div id="brandList"></div>
        </div>

        <!-- PRICE SECTION -->
        <div id="priceSection" style="display:none;">
          <h3>Select Maximum Price</h3>

          <input type="number" id="priceInput" placeholder="Enter price limit">

          <h4>Quick Select</h4>
          <div id="quickPrices"></div>
        </div>

      </div>

    </div>
  </div>

  <div id="laptopResults"></div>

  <script>
    let selectedBrands = [];

    function showSection(sectionId) {
      document.getElementById("brandSection").style.display = "none";
      document.getElementById("priceSection").style.display = "none";

      document.getElementById(sectionId).style.display = "block";

      document.querySelectorAll(".filter-options li").forEach(li =>
        li.classList.remove("active")
      );

      event.target.classList.add("active");
    }

    function openFilter() {
      document.getElementById("filterPanel").style.display = "block";
    }

    function closeFilter() {
      document.getElementById("filterPanel").style.display = "none";
    }

    // Load brands dynamically
    fetch("/api/brands")
      .then(res => res.json())
      .then(data => {
        const brandList = document.getElementById("brandList");

        data.forEach(brand => {
          const div = document.createElement("div");
          div.className = "brand-item";
          div.innerHTML = `
            <label>
              <input type="checkbox" value="${brand}">
              ${brand}
            </label>
          `;
          brandList.appendChild(div);
        });
      });

    //price fetch
    fetch("/api/maxPrice")
      .then(res => res.json())
      .then(data => {

        const max = data.maxPrice;

        const quickValues = [30000, 40000, 50000, 70000, 80000, 100000, max];

        const quickDiv = document.getElementById("quickPrices");

        quickValues.forEach(value => {
          const btn = document.createElement("button");
          btn.style.margin = "5px";
          btn.innerText = value;
          btn.onclick = () => {
            document.getElementById("priceInput").value = value;
          };
          quickDiv.appendChild(btn);
        });
      });

    function applyFilter() {

      const checked = document.querySelectorAll("#brandList input:checked");
      const selectedBrands = Array.from(checked).map(cb => cb.value);

      const priceLimit = parseInt(document.getElementById("priceInput").value);

      fetch("/api/laptops", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          brands: selectedBrands,
          maxPrice: priceLimit
        })
      })
        .then(res => res.json())
        .then(data => {

          const resultsDiv = document.getElementById("laptopResults");
          resultsDiv.innerHTML = "";

          if (data.length === 0) {
            resultsDiv.innerHTML = "<p style='text-align:center;'>No laptops found</p>";
            closeFilter();
            return;
          }

          data.forEach(laptop => {
            const card = document.createElement("div");
            card.className = "laptop-card";
            card.innerHTML = `
        <h3>${laptop["Product name"]}</h3>
        <p><b>Brand:</b> ${laptop["Brand:"]}</p>
        <p><b>Processor:</b> ${laptop["Processor"]}</p>
        <p><b>RAM:</b> ${laptop["RAM"]}</p>
        <p><b>Price:</b> ${laptop["Price"]}</p>
      `;
            resultsDiv.appendChild(card);
          });

          closeFilter();
        });
    }


  </script>

</body>

</html>
